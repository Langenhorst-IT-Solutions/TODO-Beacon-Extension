name: Release RC

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-rc:
    name: Semantic Release (RC)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Build extension
        run: npm run package
        env:
          HUSKY: 0

      - name: Release RC
        run: npx semantic-release
        env:
          # dev/main are protected by a ruleset; the default GITHUB_TOKEN acts
          # as the github-actions bot, which isn't on the bypass list and
          # can't push the release commit/tag. RELEASE_PAT belongs to a repo
          # admin, which the ruleset's "Repository admin" bypass actor allows.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
