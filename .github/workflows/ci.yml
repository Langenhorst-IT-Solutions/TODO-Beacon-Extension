name: CI

on:
  push:
    branches-ignore:
      - main
      - dev
  pull_request:

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check-types

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: xvfb-run -a npm test
        env:
          HUSKY: 0
