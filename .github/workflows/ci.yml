name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check-types

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: xvfb-run -a npm run coverage
        env:
          HUSKY: 0

      - name: Update coverage badge
        if: github.event_name == 'push'
        env:
          # dev/main are protected by a ruleset; the default GITHUB_TOKEN acts
          # as the github-actions bot, which isn't on the bypass list and
          # can't push this commit. RELEASE_PAT belongs to a repo admin,
          # which the ruleset's "Repository admin" bypass actor allows.
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          npm run coverage:badge
          git add .github/badges/coverage.json
          if ! git diff --cached --quiet -- .github/badges/coverage.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore(coverage): update coverage badge [skip ci]"
            git push "https://x-access-token:${RELEASE_PAT}@github.com/${{ github.repository }}.git" "HEAD:${{ github.ref_name }}"
          fi
